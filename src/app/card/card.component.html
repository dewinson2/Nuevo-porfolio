<div class="max-w-md text-black rounded-3xl overflow-hidden relative border border-white/10 shadow-xl dark:text-background">
    <!-- Borde superior azul -->
    <div class="absolute top-0 left-6 right-6 h-1.5 bg-blue-500 rounded-b-md"></div>

    <!-- Imagen del proyecto -->
    <div class="relative w-full h-[225px] overflow-hidden border-b border-white/10">
        <img
            [ngSrc]="card.imageUrl"
            [alt]="card.title"
            fill
            class="object-cover hover:scale-105 transition-transform duration-300"
        />
    </div>

    <!-- Contenido -->
    <div class="p-6 space-y-4.5">
        <!-- Título del proyecto -->
        <h3 class="text-2xl font-bold leading-tight bg-gradient-to-r from-black to-primary bg-clip-text text-transparent dark:text-background">
            {{card.title}}
        </h3>

        <!-- Skills -->
        <div class="flex flex-wrap gap-3">
            @for (cat of card.category; track cat.id) {
            <span class="px-4 py-1 rounded-full border border-primary text-primary text-sm hover:border-blue-400/50 transition-all">
                {{cat.name}}
            </span>
            }
        </div>

        <!-- Descripción -->
        <p class="leading-relaxed">
            {{card.description}}
        </p>

        <div class="flex gap-4">
            @if (card.githubUrl) {
            <a
                [href]="card.githubUrl"
                target="_blank"
                rel="noopener noreferrer"
                class="inline-flex items-center px-6 py-3 rounded-xl border transition-all group"
                [attr.aria-label]="'Ver código de ' + card.title + ' en GitHub (abre en nueva pestaña)'"
            >
                <svg class="w-5 h-5 mr-2 group-hover:scale-110 transition-transform" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                <span class="font-medium">View Code</span>
            </a>
            }

            @if (card.previewUrl) {
            <a
                [href]="card.previewUrl"
                target="_blank"
                rel="noopener noreferrer"
                class="inline-flex items-center px-6 py-3 rounded-xl border transition-all group"
                [attr.aria-label]="'Ver preview de ' + card.title + ' (abre en nueva pestaña)'"
            >
                <img src="Link.svg" alt="Icono de enlace" width="20" height="20" loading="lazy" class="w-5 h-5 mr-2 group-hover:scale-110 transition-transform block dark:hidden">
                <img src="LinkOscuro.svg" alt="Icono de enlace" width="20" height="20" loading="lazy" class="w-5 h-5 mr-2 group-hover:scale-110 transition-transform hidden dark:block">
                <span class="font-medium">Preview</span>
            </a>
            }
        </div>
    </div>
</div>
