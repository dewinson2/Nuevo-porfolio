<section id="proyectos" class="py-16 scroll-m-20 dark:text-background">
    <div class="max-w-5xl mx-auto px-4">
        <h2 class="text-2xl font-bold mb-8 flex items-center gap-2">
            <span class="text-gray-400">
                <img src="Code.svg" alt="" width="28" height="28" class="block dark:hidden">
                <img src="CodeOscuro.svg" alt="" width="28" height="28" class="hidden dark:block">
            </span>
            Proyectos
        </h2>
        <div class="grid md:grid-cols-2 gap-6">
            @for (card of cards; track card.id) {
                <app-card [card]="card"></app-card>
            }
        </div>
    </div>
</section>
